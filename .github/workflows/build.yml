          package com.ancientkingdoms.network.packets;
          import com.ancientkingdoms.kingdom.*;
          import com.ancientkingdoms.network.AKNetwork;
          import net.minecraft.core.BlockPos;
          import net.minecraft.network.FriendlyByteBuf;
          import net.minecraft.network.chat.Component;
          import net.minecraft.server.level.ServerPlayer;
          import net.minecraftforge.network.NetworkEvent;
          import java.util.function.Supplier;
          public class KingdomUpgradePacket {
              private final BlockPos fp; private final int idx;
              public KingdomUpgradePacket(BlockPos p, int i) { fp=p; idx=i; }
              public static void encode(KingdomUpgradePacket m, FriendlyByteBuf b) { b.writeBlockPos(m.fp); b.writeInt(m.idx); }
              public static KingdomUpgradePacket decode(FriendlyByteBuf b) { return new KingdomUpgradePacket(b.readBlockPos(), b.readInt()); }
              public static void handle(KingdomUpgradePacket m, Supplier<NetworkEvent.Context> ctx) {
                  ctx.get().enqueueWork(() -> {
                      ServerPlayer p = ctx.get().getSender(); if (p==null) return;
                      KingdomData k = KingdomManager.getKingdomAt(p.level(), m.fp); if (k==null||!k.isOwner(p.getUUID())) return;
                      if (m.idx<0||m.idx>=k.getBuildings().size()) return;
                      KingdomData.BuildingSlot b = k.getBuildings().get(m.idx);
                      if (k.getXp()>=b.xpCost) { k.addXp(-b.xpCost); b.currentLevel++; KingdomManager.get(p.level()).setDirty(); AKNetwork.sendToPlayer(p, new SyncKingdomDataPacket(k)); }
                      else p.sendSystemMessage(Component.literal("§cNot enough Kingdom XP!"));
                  });
                  ctx.get().setPacketHandled(true);
              }
          }
