          cat > src/main/java/com/ancientkingdoms/block/KingdomFlagBlock.java << 'ENDOFFILE'
          package com.ancientkingdoms.block;
          import com.ancientkingdoms.kingdom.KingdomData;
          import com.ancientkingdoms.kingdom.KingdomManager;
          import com.ancientkingdoms.network.AKNetwork;
          import com.ancientkingdoms.network.packets.OpenKingdomMenuPacket;
          import net.minecraft.core.BlockPos;
          import net.minecraft.network.chat.Component;
          import net.minecraft.server.level.ServerPlayer;
          import net.minecraft.world.InteractionHand;
          import net.minecraft.world.InteractionResult;
          import net.minecraft.world.entity.player.Player;
          import net.minecraft.world.level.Level;
          import net.minecraft.world.level.block.Block;
          import net.minecraft.world.level.block.SoundType;
          import net.minecraft.world.level.block.state.BlockBehaviour;
          import net.minecraft.world.level.block.state.BlockState;
          import net.minecraft.world.level.block.state.StateDefinition;
          import net.minecraft.world.level.block.state.properties.BooleanProperty;
          import net.minecraft.world.level.material.MapColor;
          import net.minecraft.world.phys.BlockHitResult;
          public class KingdomFlagBlock extends Block {
              public static final BooleanProperty UPPER = BooleanProperty.create("upper");
              public KingdomFlagBlock() {
                  super(BlockBehaviour.Properties.of().mapColor(MapColor.WOOD).strength(2f,5f).sound(SoundType.WOOD).noOcclusion());
                  registerDefaultState(stateDefinition.any().setValue(UPPER, false));
              }
              @Override
              protected void createBlockStateDefinition(StateDefinition.Builder<Block, BlockState> b) { b.add(UPPER); }
              @Override
              public void onPlace(BlockState state, Level level, BlockPos pos, BlockState old, boolean moved) {
                  super.onPlace(state, level, pos, old, moved);
                  if (!level.isClientSide && !state.getValue(UPPER))
                      for (int i = 1; i <= 2; i++)
                          level.setBlock(pos.above(i), defaultBlockState().setValue(UPPER, true), 3);
              }
              @Override
              public void onRemove(BlockState state, Level level, BlockPos pos, BlockState newState, boolean moved) {
                  if (!level.isClientSide && !state.getValue(UPPER)) {
                      for (int i = 1; i <= 2; i++) {
                          BlockPos up = pos.above(i);
                          if (level.getBlockState(up).getBlock() instanceof KingdomFlagBlock) level.removeBlock(up, false);
                      }
                      KingdomManager.removeKingdomAt(level, pos);
                  }
                  super.onRemove(state, level, pos, newState, moved);
              }
              @Override
              public InteractionResult use(BlockState state, Level level, BlockPos pos, Player player, InteractionHand hand, BlockHitResult hit) {
                  if (!level.isClientSide) {
                      BlockPos base = state.getValue(UPPER) ? findBase(level, pos) : pos;
                      if (base == null) return InteractionResult.FAIL;
                      KingdomData k = KingdomManager.getKingdomAt(level, base);
                      if (k == null) k = KingdomManager.createKingdom(level, base, player);
                      if (player instanceof ServerPlayer sp) {
                          if (k.isOwner(player.getUUID())) AKNetwork.sendToPlayer(sp, new OpenKingdomMenuPacket(base));
                          else player.sendSystemMessage(Component.literal("§cThis kingdom belongs to " + k.getOwnerName() + "!"));
                      }
                  }
                  return InteractionResult.sidedSuccess(level.isClientSide);
              }
              private BlockPos findBase(Level level, BlockPos pos) {
                  for (int i = 0; i <= 2; i++) {
                      BlockPos c = pos.below(i);
                      BlockState bs = level.getBlockState(c);
                      if (bs.getBlock() instanceof KingdomFlagBlock && !bs.getValue(UPPER)) return c;
                  }
                  return null;
              }
          }
          ENDOFFILE

          cat > src/main/java/com/ancientkingdoms/item/AKArmorMaterials.java << 'ENDOFFILE'
          package com.ancientkingdoms.item;
          import com.ancientkingdoms.AncientKingdoms;
          import net.minecraft.sounds.SoundEvent;
          import net.minecraft.sounds.SoundEvents;
          import net.minecraft.world.item.ArmorItem;
          import net.minecraft.world.item.ArmorMaterial;
          import net.minecraft.world.item.crafting.Ingredient;
          import net.minecraftforge.common.util.NonNullLazy;
          import java.util.function.Supplier;
          public enum AKArmorMaterials implements ArmorMaterial {
              BRONZE("bronze",15,new int[]{2,5,6,2},9,SoundEvents.ARMOR_EQUIP_IRON,0f,0f,()->Ingredient.of(AKItems.BRONZE_INGOT.get())),
              KNIGHT("knight_armor",30,new int[]{3,7,8,3},12,SoundEvents.ARMOR_EQUIP_IRON,1f,0.1f,()->Ingredient.of(AKItems.IRON_CHAIN_LINK.get()));
              private static final int[] HEALTH={13,15,16,11};
              private final String name; private final int dur; private final int[] armor;
              private final int ench; private final SoundEvent sound; private final float tough,kbr;
              private final NonNullLazy<Ingredient> repair;
              AKArmorMaterials(String n,int d,int[] a,int e,SoundEvent s,float t,float k,Supplier<Ingredient> r){name=n;dur=d;armor=a;ench=e;sound=s;tough=t;kbr=k;repair=NonNullLazy.of(r);}
              @Override public int getDurabilityForType(ArmorItem.Type t){return HEALTH[t.getSlot().getIndex()]*dur;}
              @Override public int getDefenseForType(ArmorItem.Type t){return armor[t.getSlot().getIndex()];}
              @Override public int getEnchantmentValue(){return ench;}
              @Override public SoundEvent getEquipSound(){return sound;}
              @Override public Ingredient getRepairIngredient(){return repair.get();}
              @Override public String getName(){return AncientKingdoms.MOD_ID+":"+name;}
              @Override public float getToughness(){return tough;}
              @Override public float getKnockbackResistance(){return kbr;}
          }
          ENDOFFILE

