          package com.ancientkingdoms.network.packets;
          import net.minecraft.core.BlockPos;
          import net.minecraft.network.FriendlyByteBuf;
          import net.minecraftforge.network.NetworkEvent;
          import java.util.function.Supplier;
          public class OpenKingdomMenuPacket {
              private final BlockPos flagPos;
              public OpenKingdomMenuPacket(BlockPos p) { flagPos = p; }
              public static void encode(OpenKingdomMenuPacket m, FriendlyByteBuf b) { b.writeBlockPos(m.flagPos); }
              public static OpenKingdomMenuPacket decode(FriendlyByteBuf b) { return new OpenKingdomMenuPacket(b.readBlockPos()); }
              public static void handle(OpenKingdomMenuPacket m, Supplier<NetworkEvent.Context> ctx) {
                  ctx.get().enqueueWork(() -> com.ancientkingdoms.gui.ClientGuiHelper.openKingdomMenu(m.flagPos));
                  ctx.get().setPacketHandled(true);
              }
          }
