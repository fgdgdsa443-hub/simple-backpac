          package com.ancientkingdoms.network.packets;
          import com.ancientkingdoms.blueprint.*;
          import net.minecraft.core.BlockPos;
          import net.minecraft.network.FriendlyByteBuf;
          import net.minecraft.network.chat.Component;
          import net.minecraft.resources.ResourceLocation;
          import net.minecraft.server.level.ServerPlayer;
          import net.minecraft.world.item.ItemStack;
          import net.minecraft.world.level.block.state.BlockState;
          import net.minecraftforge.network.NetworkEvent;
          import net.minecraftforge.registries.ForgeRegistries;
          import java.util.Map;
          import java.util.function.Supplier;
          public class PlaceBlueprintPacket {
              private final int idx; private final BlockPos origin;
              public PlaceBlueprintPacket(int i, BlockPos p) { idx=i; origin=p; }
              public static void encode(PlaceBlueprintPacket m, FriendlyByteBuf b) { b.writeInt(m.idx); b.writeBlockPos(m.origin); }
              public static PlaceBlueprintPacket decode(FriendlyByteBuf b) { return new PlaceBlueprintPacket(b.readInt(), b.readBlockPos()); }
              public static void handle(PlaceBlueprintPacket m, Supplier<NetworkEvent.Context> ctx) {
                  ctx.get().enqueueWork(() -> {
                      ServerPlayer p = ctx.get().getSender(); if (p==null) return;
                      if (m.idx<0||m.idx>=BlueprintRegistry.size()) return;
                      BlueprintDefinition bp = BlueprintRegistry.get(m.idx);
                      for (Map.Entry<ResourceLocation,Integer> req : bp.getRequirements().entrySet()) {
                          var item = ForgeRegistries.ITEMS.getValue(req.getKey()); if (item==null) continue;
                          int need=req.getValue(), have=0;
                          for (ItemStack s : p.getInventory().items) if (s.getItem()==item) have+=s.getCount();
                          if (have<need) { p.sendSystemMessage(Component.literal("§cNeed "+need+" "+item.getDescription().getString())); return; }
                      }
                      for (Map.Entry<ResourceLocation,Integer> req : bp.getRequirements().entrySet()) {
                          var item = ForgeRegistries.ITEMS.getValue(req.getKey()); if (item==null) continue;
                          int left=req.getValue();
                          for (ItemStack s : p.getInventory().items) { if (s.getItem()==item&&left>0) { int t=Math.min(s.getCount(),left); s.shrink(t); left-=t; } }
                      }
                      for (Map.Entry<BlockPos,BlockState> e : bp.getBlocks().entrySet()) p.level().setBlock(m.origin.offset(e.getKey()), e.getValue(), 3);
                      p.sendSystemMessage(Component.literal("§a Placed: "+bp.getDisplayName()));
                  });
                  ctx.get().setPacketHandled(true);
              }
          }
          ENDOFFILE

