cat > gradle.properties <<'EOF'
      org.gradle.jvmargs=-Xmx2G
      minecraft_version=1.21.4
      yarn_mappings=1.21.4+build.8
      loader_version=0.16.10
      mod_version=1.0.0
      maven_group=ru.nix.tolyanvisuals
      archives_base_name=TolyanVisuals-1.21.4
      EOF

      cat > build.gradle <<'EOF'
      plugins {
          id 'fabric-loom' version '1.9-SNAPSHOT'
      }
      version = project.mod_version
      group = project.maven_group
      base { archivesName = project.archives_base_name }
      repositories {
          maven { url = "https://maven.fabricmc.net/" }
          mavenCentral()
      }
      dependencies {
          minecraft "com.mojang:minecraft:${project.minecraft_version}"
          mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
          modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
          modImplementation "net.fabricmc.fabric-api:fabric-api:0.114.0+1.21.4"
      }
      processResources {
          inputs.property "version", project.version
          filesMatching("fabric.mod.json") { expand "version": project.version }
      }
      tasks.withType(JavaCompile).configureEach { options.release = 21 }
      java {
          sourceCompatibility = JavaVersion.VERSION_21
          targetCompatibility = JavaVersion.VERSION_21
      }
      EOF

      cat > src/main/resources/fabric.mod.json <<'EOF'
      {
        "schemaVersion": 1,
        "id": "tolyanvisuals",
        "version": "${version}",
        "name": "Tolyan Visuals",
        "description": "Premium Visual Client for Minecraft 1.21.4",
        "authors": ["Nix"],
        "contact": {},
        "license": "MIT",
        "icon": "assets/tolyanvisuals/icon.png",
        "environment": "client",
        "entrypoints": {
          "client": [
            "ru.nix.tolyanvisuals.TolyanVisuals"
          ]
        },
        "depends": {
          "fabricloader": ">=0.16.10",
          "minecraft": "1.21.4",
          "java": ">=21",
          "fabric-api": "*"
        }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/TolyanVisuals.java <<'EOF'
      package ru.nix.tolyanvisuals;

      import net.fabricmc.api.ClientModInitializer;
      import net.fabricmc.fabric.api.client.rendering.v1.HudRenderCallback;
      import ru.nix.tolyanvisuals.module.ModuleManager;
      import ru.nix.tolyanvisuals.module.Module;
      import org.slf4j.Logger;
      import org.slf4j.LoggerFactory;

      public class TolyanVisuals implements ClientModInitializer {
          public static final String MOD_ID = "tolyanvisuals";
          public static final String CLIENT_NAME = "Tolyan Visuals";
          public static final Logger LOGGER = LoggerFactory.getLogger(CLIENT_NAME);
          
          public static ModuleManager moduleManager;

          @Override
          public void onInitializeClient() {
              LOGGER.info("Initializing {} Premium UI...", CLIENT_NAME);
              
              moduleManager = new ModuleManager();
              
              // Хук в рендер HUD'а
              HudRenderCallback.EVENT.register((drawContext, tickDelta) -> {
                  for (Module module : moduleManager.getModules()) {
                      if (module.isToggled()) {
                          module.onRender(drawContext, tickDelta);
                      }
                  }
              });
          }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/module/Category.java <<'EOF'
      package ru.nix.tolyanvisuals.module;

      public enum Category {
          VISUAL("Visual"),
          HUD("HUD"),
          INTERFACE("Interface"),
          RENDER("Render"),
          SETTINGS("Settings"),
          COSMETICS("Cosmetics");

          public final String name;

          Category(String name) {
              this.name = name;
          }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/module/Module.java <<'EOF'
      package ru.nix.tolyanvisuals.module;

      import net.minecraft.client.MinecraftClient;
      import net.minecraft.client.gui.DrawContext;

      public class Module {
          private final String name;
          private final Category category;
          private boolean toggled;
          protected final MinecraftClient mc = MinecraftClient.getInstance();

          public Module(String name, Category category) {
              this.name = name;
              this.category = category;
              this.toggled = false;
          }

          public void toggle() {
              this.toggled = !this.toggled;
              if (toggled) onEnable();
              else onDisable();
          }

          public void onEnable() {}
          public void onDisable() {}
          
          public void onRender(DrawContext context, float tickDelta) {}

          public String getName() { return name; }
          public Category getCategory() { return category; }
          public boolean isToggled() { return toggled; }
          public void setToggled(boolean toggled) { this.toggled = toggled; }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/module/ModuleManager.java <<'EOF'
      package ru.nix.tolyanvisuals.module;

      import ru.nix.tolyanvisuals.module.hud.Watermark;
      import java.util.ArrayList;
      import java.util.List;

      public class ModuleManager {
          private final List<Module> modules = new ArrayList<>();

          public ModuleManager() {
              // Регистрируем модули
              addModule(new Watermark());
          }

          private void addModule(Module module) {
              modules.add(module);
          }

          public List<Module> getModules() {
              return modules;
          }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/utils/ColorUtils.java <<'EOF'
      package ru.nix.tolyanvisuals.utils;

      public class ColorUtils {
          // Плавный переход от пурпурного к розовому в зависимости от времени
          public static int getGradient(int offset) {
              double speed = 3000.0;
              double time = (System.currentTimeMillis() + offset) % speed / speed;
              
              // Accent: #8B5CF6 (Purple)
              int r1 = 139, g1 = 92, b1 = 246;
              // Accent Glow: #A855F7 (Pink/Purple)
              int r2 = 168, g2 = 85, b2 = 247;
              
              double factor = (Math.sin(time * Math.PI * 2) + 1.0) / 2.0;
              
              int r = (int) (r1 + (r2 - r1) * factor);
              int g = (int) (g1 + (g2 - g1) * factor);
              int b = (int) (b1 + (b2 - b1) * factor);
              
              return (255 << 24) | (r << 16) | (g << 8) | b;
          }
      }
      EOF

      cat > src/main/java/ru/nix/tolyanvisuals/module/hud/Watermark.java <<'EOF'
      package ru.nix.tolyanvisuals.module.hud;

      import net.minecraft.client.gui.DrawContext;
      import ru.nix.tolyanvisuals.module.Category;
      import ru.nix.tolyanvisuals.module.Module;
      import ru.nix.tolyanvisuals.utils.ColorUtils;
      import ru.nix.tolyanvisuals.TolyanVisuals;

      public class Watermark extends Module {
          
          public Watermark() {
              super("Watermark", Category.HUD);
              setToggled(true); // Включен по умолчанию
          }

          @Override
          public void onRender(DrawContext context, float tickDelta) {
              if (mc.textRenderer == null) return;
              
              String text = TolyanVisuals.CLIENT_NAME + " | 1.21.4 | FPS: " + mc.getCurrentFps();
              
              int x = 5;
              int y = 5;
              
              // Отрисовка текста по буквам для градиентного эффекта (gradient text)
              int currentX = x;
              for (int i = 0; i < text.length(); i++) {
                  String character = String.valueOf(text.charAt(i));
                  int color = ColorUtils.getGradient(i * -20);
                  
                  context.drawText(mc.textRenderer, character, currentX, y, color, true);
                  currentX += mc.textRenderer.getWidth(character);
              }
          }
      }
      EOF

  - name: Set up Java 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 21

  - name: Set up Gradle
    uses: gradle/actions/setup-gradle@v4
    with:
      gradle-version: 8.12.1

  - name: Build jar
    run: gradle build --no-daemon

  - name: Upload finished jar
    uses: actions/upload-artifact@v4
    with:
      name: TolyanVisuals-1.21.4-Release
      path: |
        build/libs/*.jar
        !build/libs/*-sources.jar
        !build/libs/*-dev.jar
