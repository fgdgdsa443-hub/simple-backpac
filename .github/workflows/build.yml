          import net.minecraftforge.registries.RegistryObject;
          public class AKBiomes {
              public static final DeferredRegister<Biome> BIOMES = DeferredRegister.create(Registries.BIOME, AncientKingdoms.MOD_ID);
              public static final RegistryObject<Biome> ANCIENT_RUINS = BIOMES.register("ancient_ruins", AKBiomes::makeAncientRuins);
              public static final RegistryObject<Biome> MEDIEVAL_FOREST = BIOMES.register("medieval_forest", AKBiomes::makeMedievalForest);
              public static final RegistryObject<Biome> GOLDEN_SAVANNAH = BIOMES.register("golden_savannah", AKBiomes::makeGoldenSavannah);
              public static final RegistryObject<Biome> CRIMSON_STEPPE = BIOMES.register("crimson_steppe", AKBiomes::makeCrimsonSteppe);
              private static Biome makeAncientRuins() {
                  BiomeGenerationSettings.Builder gen = new BiomeGenerationSettings.Builder(null, null);
                  BiomeDefaultFeatures.addDefaultCarversAndLakes(gen);
                  MobSpawnSettings.Builder mob = new MobSpawnSettings.Builder(); BiomeDefaultFeatures.commonSpawns(mob);
                  return new Biome.BiomeBuilder().hasPrecipitation(false).temperature(0.9f).downfall(0.1f)
                      .specialEffects(new BiomeSpecialEffects.Builder().waterColor(0x3F76E4).waterFogColor(0x050533).fogColor(0xC0D8FF).skyColor(0x77ADFF).grassColorOverride(0xBFAA6A).foliageColorOverride(0xBFAA6A).ambientMoodSound(AmbientMoodSettings.LEGACY_CAVE_SETTINGS).build())
