          package com.ancientkingdoms.entity;
          import com.ancientkingdoms.kingdom.*;
          import net.minecraft.core.BlockPos;
          import net.minecraft.nbt.CompoundTag;
          import net.minecraft.network.chat.Component;
          import net.minecraft.world.InteractionHand;
          import net.minecraft.world.InteractionResult;
          import net.minecraft.world.entity.*;
          import net.minecraft.world.entity.ai.attributes.*;
          import net.minecraft.world.entity.ai.goal.*;
          import net.minecraft.world.entity.player.Player;
          import net.minecraft.world.item.*;
          import net.minecraft.world.level.Level;
          import java.util.UUID;
          public class WorkerNpcEntity extends PathfinderMob {
              private BlockPos kingdomFlagPos = null;
              private UUID workerId = UUID.randomUUID();
              private String workerName = "Worker";
              public WorkerNpcEntity(EntityType<? extends WorkerNpcEntity> type, Level level) { super(type, level); }
              public static AttributeSupplier.Builder createAttributes() {
                  return PathfinderMob.createMobAttributes().add(Attributes.MAX_HEALTH,20.0).add(Attributes.MOVEMENT_SPEED,0.25);
              }
              @Override protected void registerGoals() {
                  goalSelector.addGoal(1, new LookAtPlayerGoal(this, Player.class, 8f));
                  goalSelector.addGoal(2, new WaterAvoidingRandomStrollGoal(this, 0.6));
                  goalSelector.addGoal(3, new RandomLookAroundGoal(this));
              }
              @Override public InteractionResult mobInteract(Player player, InteractionHand hand) {
                  if (!level().isClientSide && kingdomFlagPos != null) {
                      KingdomData k = KingdomManager.getKingdomAt(level(), kingdomFlagPos);
                      if (k != null) for (KingdomData.NpcWorker w : k.getWorkers()) if (w.workerId.equals(workerId)) {
                          if (w.isBusy()) player.sendSystemMessage(Component.literal(workerName+": Busy "+w.secondsLeft()+"s left."));
                          else if (!w.currentTask.isEmpty()) deliverRewards(player, w);
                          else player.sendSystemMessage(Component.literal(workerName+": Idle. Assign me a task!"));
                          return InteractionResult.SUCCESS;
                      }
                  }
                  return super.mobInteract(player, hand);
              }
              private void deliverRewards(Player player, KingdomData.NpcWorker w) {
                  String t = w.currentTask.toLowerCase(); ItemStack rw;
                  if (t.contains("wood")||t.contains("tree")) rw = new ItemStack(Items.OAK_LOG, 16+random.nextInt(16));
                  else if (t.contains("stone")||t.contains("mine")) rw = new ItemStack(Items.COBBLESTONE, 20+random.nextInt(20));
                  else if (t.contains("food")||t.contains("farm")) rw = new ItemStack(Items.BREAD, 8+random.nextInt(8));
                  else rw = new ItemStack(Items.GOLD_NUGGET, 5+random.nextInt(5));
                  player.addItem(rw); player.sendSystemMessage(Component.literal(workerName+": Done!"));
                  w.currentTask = ""; w.taskFinishTime = 0; KingdomManager.get(level()).setDirty();
              }
              @Override public void addAdditionalSaveData(CompoundTag t) {
                  super.addAdditionalSaveData(t);
                  if (kingdomFlagPos != null) { t.putInt("FlagX",kingdomFlagPos.getX()); t.putInt("FlagY",kingdomFlagPos.getY()); t.putInt("FlagZ",kingdomFlagPos.getZ()); }
                  t.putUUID("WorkerId", workerId); t.putString("WorkerName", workerName);
              }
              @Override public void readAdditionalSaveData(CompoundTag t) {
                  super.readAdditionalSaveData(t);
                  if (t.contains("FlagX")) kingdomFlagPos = new BlockPos(t.getInt("FlagX"),t.getInt("FlagY"),t.getInt("FlagZ"));
                  if (t.contains("WorkerId")) workerId = t.getUUID("WorkerId");
                  if (t.contains("WorkerName")) workerName = t.getString("WorkerName");
              }
              @Override public Component getDisplayName() { return Component.literal(workerName); }
          }
          ENDOFFILE

