name: Build Ancient Kingdoms Mod

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create project files
        run: |
          mkdir -p src/main/java/com/ancientkingdoms/block
          mkdir -p src/main/java/com/ancientkingdoms/item
          mkdir -p src/main/java/com/ancientkingdoms/entity
          mkdir -p src/main/java/com/ancientkingdoms/biome
          mkdir -p src/main/java/com/ancientkingdoms/kingdom
          mkdir -p src/main/java/com/ancientkingdoms/blueprint
          mkdir -p src/main/java/com/ancientkingdoms/network/packets
          mkdir -p src/main/java/com/ancientkingdoms/gui
          mkdir -p src/main/java/com/ancientkingdoms/client
          mkdir -p src/main/resources/META-INF
          mkdir -p src/main/resources/assets/ancientkingdoms/lang
          mkdir -p src/main/resources/assets/ancientkingdoms/models/block
          mkdir -p src/main/resources/assets/ancientkingdoms/models/item
          mkdir -p src/main/resources/assets/ancientkingdoms/blockstates
          mkdir -p src/main/resources/data/ancientkingdoms/recipes
          mkdir -p src/main/resources/data/ancientkingdoms/loot_tables/blocks

          cat > settings.gradle << 'ENDOFFILE'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  maven { url = 'https://maven.minecraftforge.net' }
              }
          }
          rootProject.name = 'ancientkingdoms'
          ENDOFFILE

          cat > gradle.properties << 'ENDOFFILE'
          org.gradle.jvmargs=-Xmx4G
          org.gradle.daemon=false
          ENDOFFILE

          cat > build.gradle << 'ENDOFFILE'
          plugins {
              id 'java'
              id 'net.minecraftforge.gradle' version '6.0.24'
          }
          version = '1.0.0'
          group = 'com.ancientkingdoms'
          archivesBaseName = 'ancientkingdoms'
          java { toolchain.languageVersion = JavaLanguageVersion.of(21) }
          minecraft {
              mappings channel: 'official', version: '1.21.1'
              runs {
                  client {
                      workingDirectory project.file('run')
                      property 'forge.logging.console.level', 'debug'
                      mods { ancientkingdoms { source sourceSets.main } }
                  }
                  server {
                      workingDirectory project.file('run')
                      property 'forge.logging.console.level', 'debug'
                      mods { ancientkingdoms { source sourceSets.main } }
                  }
              }
          }
          repositories {
              maven { url = 'https://maven.minecraftforge.net' }
              mavenCentral()
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.21.1-52.1.0'
          }
          jar {
              manifest {
                  attributes([
                      "Specification-Title": "ancientkingdoms",
                      "Specification-Version": "1",
                      "Implementation-Title": project.name,
                      "Implementation-Version": project.jar.archiveVersion,
                      "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
                  ])
              }
          }
          ENDOFFILE

          cat > src/main/resources/META-INF/mods.toml << 'ENDOFFILE'
          modLoader="javafml"
          loaderVersion="[52,)"
          license="MIT"
          [[mods]]
              modId="ancientkingdoms"
              version="1.0.0"
              displayName="Ancient Kingdoms"
              description="Medieval kingdoms mod!"
          [[dependencies.ancientkingdoms]]
              modId="forge"
              mandatory=true
              versionRange="[52,)"
              ordering="NONE"
              side="BOTH"
          [[dependencies.ancientkingdoms]]
              modId="minecraft"
              mandatory=true
              versionRange="[1.21.1,1.22)"
              ordering="NONE"
              side="BOTH"
          ENDOFFILE

          printf 'Manifest-Version: 1.0\n' > src/main/resources/META-INF/MANIFEST.MF

          cat > src/main/java/com/ancientkingdoms/AncientKingdoms.java << 'ENDOFFILE'
          package com.ancientkingdoms;
          import com.ancientkingdoms.biome.AKBiomes;
          import com.ancientkingdoms.block.AKBlocks;
          import com.ancientkingdoms.entity.AKEntities;
          import com.ancientkingdoms.item.AKItems;
          import com.ancientkingdoms.network.AKNetwork;
          import net.minecraftforge.eventbus.api.IEventBus;
          import net.minecraftforge.fml.common.Mod;
          import net.minecraftforge.fml.event.lifecycle.FMLClientSetupEvent;
          import net.minecraftforge.fml.event.lifecycle.FMLCommonSetupEvent;
          import net.minecraftforge.fml.javafmlmod.FMLJavaModLoadingContext;
          import org.apache.logging.log4j.LogManager;
          import org.apache.logging.log4j.Logger;
          @Mod(AncientKingdoms.MOD_ID)
          public class AncientKingdoms {
              public static final String MOD_ID = "ancientkingdoms";
              public static final Logger LOGGER = LogManager.getLogger(MOD_ID);
              public AncientKingdoms() {
                  IEventBus bus = FMLJavaModLoadingContext.get().getModEventBus();
                  AKBlocks.BLOCKS.register(bus);
                  AKItems.ITEMS.register(bus);
                  AKEntities.ENTITY_TYPES.register(bus);
                  AKBiomes.BIOMES.register(bus);
                  bus.addListener(this::commonSetup);
                  bus.addListener(this::clientSetup);
              }
              private void commonSetup(final FMLCommonSetupEvent e) { AKNetwork.register(); }
              private void clientSetup(final FMLClientSetupEvent e) {}
          }
          ENDOFFILE

