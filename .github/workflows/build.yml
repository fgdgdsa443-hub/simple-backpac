          import java.util.Map;
          public class BlueprintScreen extends Screen {
              private int cur = 0;
              private Button prevBtn, nextBtn;
              public BlueprintScreen() { super(Component.literal("Blueprint Scroll")); }
              @Override protected void init() {
                  super.init();
                  prevBtn = addRenderableWidget(Button.builder(Component.literal("<"), b -> { cur=(cur-1+BlueprintRegistry.size())%BlueprintRegistry.size(); }).bounds(width/2-130,height/2-10,30,20).build());
                  nextBtn = addRenderableWidget(Button.builder(Component.literal(">"), b -> { cur=(cur+1)%BlueprintRegistry.size(); }).bounds(width/2+100,height/2-10,30,20).build());
                  addRenderableWidget(Button.builder(Component.literal("Place (ENTER)"), b -> tryPlace()).bounds(width/2-60,height-40,120,20).build());
                  addRenderableWidget(Button.builder(Component.literal("Close"), b -> onClose()).bounds(width/2-30,height-18,60,16).build());
              }
              @Override public boolean keyPressed(int key, int sc, int mod) {
                  if (key==263) { prevBtn.onPress(); return true; }
                  if (key==262) { nextBtn.onPress(); return true; }
                  if (key==257||key==335) { tryPlace(); return true; }
                  return super.keyPressed(key, sc, mod);
              }
              private void tryPlace() {
                  Player pl = Minecraft.getInstance().player; if (pl==null) return;
                  AKNetwork.sendToServer(new PlaceBlueprintPacket(cur, pl.blockPosition().relative(pl.getDirection()))); onClose();
              }
              @Override public void render(GuiGraphics g, int mx, int my, float pt) {
                  renderBackground(g, mx, my, pt);
                  BlueprintDefinition bp = BlueprintRegistry.get(cur);
                  Player pl = Minecraft.getInstance().player;
                  int px=width/2-120, py=20;
                  g.fill(px,py,px+240,py+height-50,0xCC1A1A1A); g.fill(px,py,px+240,py+2,0xFFFFD700);
                  g.drawCenteredString(font, bp.getDisplayName(), width/2, py+8, 0xFFFFFF);
                  g.drawCenteredString(font, (cur+1)+" / "+BlueprintRegistry.size(), width/2, py+18, 0x888888);
                  g.drawString(font, bp.getDescription(), px+8, py+32, 0xCCCCCC);
                  g.drawString(font, "Size: "+bp.getDimensions(), px+8, py+44, 0xFFFFFF);
                  g.drawString(font, "Required:", px+8, py+58, 0xFFD700);
                  int ry = py+70;
                  for (Map.Entry<ResourceLocation,Integer> req : bp.getRequirements().entrySet()) {
                      Item item = ForgeRegistries.ITEMS.getValue(req.getKey()); int need=req.getValue();
                      boolean has=false; if (pl!=null&&item!=null) { int h=0; for (ItemStack s:pl.getInventory().items) if(s.getItem()==item) h+=s.getCount(); has=h>=need; }
                      String nm = item!=null ? item.getDescription().getString() : req.getKey().getPath();
                      g.drawString(font, (has?"§a":"§c")+nm+" x"+need, px+12, ry, 0xFFFFFF); ry+=11;
                  }
                  super.render(g, mx, my, pt);
              }
              @Override public boolean isPauseScreen() { return false; }
          }
