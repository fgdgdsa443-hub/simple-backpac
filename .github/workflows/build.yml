      - name: Download Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar"
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.8-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          curl -fsSL -o gradlew "https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradlew"
          chmod +x gradlew
          echo "=== FORGE: 1.21.1-52.1.0 | ForgeGradle: 6.0.24 ==="

      - name: Build JAR
        run: ./gradlew build --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4G"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ancientkingdoms-1.21.1-forge-52
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
          if-no-files-found: warn

