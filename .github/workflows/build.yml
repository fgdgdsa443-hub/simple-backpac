name: Build Simple Backpack Jar

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Fabric mod project
        run: |
          mkdir -p src/main/java/ru/simplebackpack
          mkdir -p src/main/resources/assets/simplebackpack/items
          mkdir -p src/main/resources/assets/simplebackpack/lang
          mkdir -p src/main/resources/data/simplebackpack/recipe

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  maven {
                      name = "Fabric"
                      url = "https://maven.fabricmc.net/"
                  }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2G

          minecraft_version=1.21.4
          yarn_mappings=1.21.4+build.8
          loader_version=0.16.10

          mod_version=1.0.0
          maven_group=ru.simplebackpack
          archives_base_name=simple-backpack-1.21.4
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'fabric-loom' version '1.9-SNAPSHOT'
          }

          version = project.mod_version
          group = project.maven_group

          base {
              archivesName = project.archives_base_name
          }

          repositories {
              maven {
                  url = "https://maven.fabricmc.net/"
              }
              mavenCentral()
          }

          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
          }

          processResources {
              inputs.property "version", project.version

              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }

          tasks.withType(JavaCompile).configureEach {
              options.release = 21
          }

          java {
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          EOF

          cat > src/main/resources/fabric.mod.json <<'EOF'
          {
            "schemaVersion": 1,
            "id": "simplebackpack",
            "version": "${version}",
            "name": "Simple Backpack",
            "description": "Простой рюкзак на 27 ячеек для Fabric 1.21.4",
            "authors": [
              "Generated by GitHub Actions"
            ],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {
              "main": [
                "ru.simplebackpack.SimpleBackpackMod"
              ]
            },
            "depends": {
              "fabricloader": ">=0.16.10",
              "minecraft": "1.21.4",
              "java": ">=21"
            }
          }
          EOF

          cat > src/main/java/ru/simplebackpack/SimpleBackpackMod.java <<'EOF'
          package ru.simplebackpack;

          import net.fabricmc.api.ModInitializer;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.registry.RegistryKey;
          import net.minecraft.registry.RegistryKeys;
          import net.minecraft.util.Identifier;

          import java.util.function.Function;

          public class SimpleBackpackMod implements ModInitializer {
              public static final String MOD_ID = "simplebackpack";

              public static final Item BACKPACK = registerItem(
                      "backpack",
                      settings -> new BackpackItem(settings.maxCount(1))
              );

              @Override
              public void onInitialize() {
              }

              private static Item registerItem(String path, Function<Item.Settings, Item> factory) {
                  Identifier id = Identifier.of(MOD_ID, path);
                  RegistryKey<Item> key = RegistryKey.of(RegistryKeys.ITEM, id);

                  Item.Settings settings = new Item.Settings().registryKey(key);
                  Item item = factory.apply(settings);

                  return Registry.register(Registries.ITEM, id, item);
              }
          }
          EOF

          cat > src/main/java/ru/simplebackpack/BackpackItem.java <<'EOF'
          package ru.simplebackpack;

          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.screen.GenericContainerScreenHandler;
          import net.minecraft.screen.SimpleNamedScreenHandlerFactory;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import net.minecraft.util.Hand;
          import net.minecraft.world.World;

          public class BackpackItem extends Item {
              public BackpackItem(Settings settings) {
                  super(settings);
              }

              @Override
              public ActionResult use(World world, PlayerEntity user, Hand hand) {
                  if (world instanceof ServerWorld && user instanceof ServerPlayerEntity serverPlayer) {
                      ItemStack stack = user.getStackInHand(hand);
                      openBackpack(serverPlayer, stack);
                  }

                  return ActionResult.SUCCESS;
              }

              public static void openBackpack(ServerPlayerEntity player, ItemStack backpackStack) {
                  BackpackInventory inventory = new BackpackInventory(
                          backpackStack,
                          player.getRegistryManager()
                  );

                  player.openHandledScreen(new SimpleNamedScreenHandlerFactory(
                          (syncId, playerInventory, playerEntity) ->
                                  GenericContainerScreenHandler.createGeneric9x3(
                                          syncId,
                                          playerInventory,
                                          inventory
                                  ),
                          Text.translatable("item.simplebackpack.backpack")
                  ));
              }
          }
          EOF

          cat > src/main/java/ru/simplebackpack/BackpackInventory.java <<'EOF'
          package ru.simplebackpack;

          import net.minecraft.component.DataComponentTypes;
          import net.minecraft.component.type.NbtComponent;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.inventory.Inventories;
          import net.minecraft.inventory.Inventory;
          import net.minecraft.item.ItemStack;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.registry.RegistryWrapper;
          import net.minecraft.util.collection.DefaultedList;

          public class BackpackInventory implements Inventory {
              public static final int SIZE = 27;

              private final DefaultedList<ItemStack> stacks =
                      DefaultedList.ofSize(SIZE, ItemStack.EMPTY);

              private final ItemStack backpackStack;
              private final RegistryWrapper.WrapperLookup registries;

              public BackpackInventory(ItemStack backpackStack, RegistryWrapper.WrapperLookup registries) {
                  this.backpackStack = backpackStack;
                  this.registries = registries;
                  readFromStack();
              }

              private void readFromStack() {
                  NbtComponent component = backpackStack.get(DataComponentTypes.CUSTOM_DATA);

                  if (component == null) {
                      return;
                  }

                  NbtCompound nbt = component.copyNbt();

                  if (nbt.contains("Items")) {
                      Inventories.readNbt(nbt, stacks, registries);
                  }
              }

              private void writeToStack() {
                  NbtCompound nbt;

                  NbtComponent component = backpackStack.get(DataComponentTypes.CUSTOM_DATA);

                  if (component == null) {
                      nbt = new NbtCompound();
                  } else {
                      nbt = component.copyNbt();
                  }

                  nbt.remove("Items");
                  Inventories.writeNbt(nbt, stacks, registries);

                  backpackStack.set(DataComponentTypes.CUSTOM_DATA, NbtComponent.of(nbt));
              }

              @Override
              public int size() {
                  return stacks.size();
              }

              @Override
              public boolean isEmpty() {
                  for (ItemStack stack : stacks) {
                      if (!stack.isEmpty()) {
                          return false;
                      }
                  }

                  return true;
              }

              @Override
              public ItemStack getStack(int slot) {
                  return stacks.get(slot);
              }

              @Override
              public ItemStack removeStack(int slot, int amount) {
                  ItemStack result = Inventories.splitStack(stacks, slot, amount);

                  if (!result.isEmpty()) {
                      markDirty();
                  }

                  return result;
              }

              @Override
              public ItemStack removeStack(int slot) {
                  ItemStack result = Inventories.removeStack(stacks, slot);
                  markDirty();
                  return result;
              }

              @Override
              public void setStack(int slot, ItemStack stack) {
                  stacks.set(slot, stack);

                  if (stack.getCount() > getMaxCountPerStack()) {
                      stack.setCount(getMaxCountPerStack());
                  }

                  markDirty();
              }

              @Override
              public boolean isValid(int slot, ItemStack stack) {
                  return !stack.isOf(SimpleBackpackMod.BACKPACK);
              }

              @Override
              public void markDirty() {
                  writeToStack();
              }

              @Override
              public boolean canPlayerUse(PlayerEntity player) {
                  return !backpackStack.isEmpty() && backpackStack.isOf(SimpleBackpackMod.BACKPACK);
              }

              @Override
              public void onClose(PlayerEntity player) {
                  writeToStack();
              }

              @Override
              public void clear() {
                  for (int i = 0; i < stacks.size(); i++) {
                      stacks.set(i, ItemStack.EMPTY);
                  }

                  markDirty();
              }
          }
          EOF

          cat > src/main/resources/assets/simplebackpack/lang/ru_ru.json <<'EOF'
          {
            "item.simplebackpack.backpack": "Рюкзак"
          }
          EOF

          cat > src/main/resources/assets/simplebackpack/lang/en_us.json <<'EOF'
          {
            "item.simplebackpack.backpack": "Backpack"
          }
          EOF

          cat > src/main/resources/assets/simplebackpack/items/backpack.json <<'EOF'
          {
            "model": {
              "type": "minecraft:model",
              "model": "minecraft:item/bundle"
            }
          }
          EOF

          cat > src/main/resources/data/simplebackpack/recipe/backpack.json <<'EOF'
          {
            "type": "minecraft:crafting_shaped",
            "pattern": [
              "LLL",
              "LCL",
              "LLL"
            ],
            "key": {
              "L": "minecraft:leather",
              "C": "minecraft:chest"
            },
            "result": {
              "id": "simplebackpack:backpack",
              "count": 1
            }
          }
          EOF

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12.1

      - name: Build jar
        run: gradle build --no-daemon --stacktrace

      - name: Upload finished jar
        uses: actions/upload-artifact@v4
        with:
          name: simple-backpack-1.21.4-ready-jar
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
