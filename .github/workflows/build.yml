          package com.ancientkingdoms.blueprint;
          import net.minecraft.core.BlockPos;
          import net.minecraft.resources.ResourceLocation;
          import net.minecraft.world.level.block.state.BlockState;
          import java.util.Map;
          public class BlueprintDefinition {
              private final String id, displayName, description;
              private final Map<BlockPos, BlockState> blocks;
              private final Map<ResourceLocation, Integer> requirements;
              public BlueprintDefinition(String id, String dn, String desc, Map<BlockPos,BlockState> b, Map<ResourceLocation,Integer> r) {
                  this.id=id; displayName=dn; description=desc; blocks=b; requirements=r;
              }
              public String getId(){return id;} public String getDisplayName(){return displayName;} public String getDescription(){return description;}
              public Map<BlockPos,BlockState> getBlocks(){return blocks;} public Map<ResourceLocation,Integer> getRequirements(){return requirements;}
              public String getDimensions(){
                  int mx=0,my=0,mz=0;
                  for(BlockPos p:blocks.keySet()){mx=Math.max(mx,Math.abs(p.getX()));my=Math.max(my,p.getY());mz=Math.max(mz,Math.abs(p.getZ()));}
                  return (mx*2+1)+"x"+(my+1)+"x"+(mz*2+1);
              }
          }
