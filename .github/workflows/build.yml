                  KingdomData own = ClientKingdomCache.getCurrent();
                  List<KingdomData> kl = new ArrayList<>(); if (own!=null) kl.add(own);
                  for (KingdomData k : kl) {
                      BlockPos fp = k.getFlagPos();
                      int sx=mcx+(int)((fp.getX()-cx)*SC), sy=mcy+(int)((fp.getZ()-cz)*SC);
                      int r=(int)(KingdomData.TERRITORY_RADIUS*SC);
                      for (int dy=-r;dy<=r;dy++){int dx=(int)Math.sqrt(r*r-dy*dy);g.fill(sx-dx,sy+dy,sx+dx+1,sy+dy+1,0x4400CC00);}
                      g.drawString(font, "*", sx-3, sy-4, 0xFFD700);
                      String nl=k.getKingdomName(); g.drawString(font, nl, sx-font.width(nl)/2, sy-r-10, 0x8B0000);
                  }
                  g.fill(mcx-2,mcy-2,mcx+2,mcy+2,0xFFFFFFFF);
                  if (own!=null&&own.isOwner(pl.getUUID())) g.drawString(font,"[KING]",mcx-12,mcy-14,0xFFD700);
