          package com.ancientkingdoms.kingdom;
          import com.ancientkingdoms.AncientKingdoms;
          import net.minecraft.core.BlockPos;
          import net.minecraft.nbt.*;
          import net.minecraft.server.level.ServerLevel;
          import net.minecraft.world.entity.player.Player;
          import net.minecraft.world.level.Level;
          import net.minecraft.world.level.saveddata.SavedData;
          import javax.annotation.Nullable;
          import java.util.*;
          public class KingdomManager extends SavedData {
              private static final String NAME = AncientKingdoms.MOD_ID + "_kingdoms";
              private final Map<BlockPos,KingdomData> kingdoms = new HashMap<>();
              public static KingdomManager get(Level level) {
                  if (level instanceof ServerLevel sl) return sl.getDataStorage().computeIfAbsent(KingdomManager::load, KingdomManager::new, NAME);
                  throw new IllegalStateException("Client side!");
              }
              public static @Nullable KingdomData getKingdomAt(Level level, BlockPos pos) { return get(level).kingdoms.get(pos); }
              public static KingdomData createKingdom(Level level, BlockPos fp, Player player) {
                  KingdomData d = new KingdomData(player.getUUID(), player.getName().getString(), fp);
                  KingdomManager m = get(level); m.kingdoms.put(fp, d); m.setDirty(); return d;
              }
              public static void removeKingdomAt(Level level, BlockPos pos) { KingdomManager m=get(level); m.kingdoms.remove(pos); m.setDirty(); }
              public static Collection<KingdomData> getAllKingdoms(Level level) { return get(level).kingdoms.values(); }
              public static @Nullable KingdomData getKingdomForPos(Level level, BlockPos pos) {
                  for (KingdomData k : get(level).kingdoms.values()) if (k.isInsideTerritory(pos)) return k;
                  return null;
              }
              @Override public CompoundTag save(CompoundTag tag) {
                  ListTag list = new ListTag(); for (KingdomData k : kingdoms.values()) list.add(k.save()); tag.put("Kingdoms", list); return tag;
              }
              public static KingdomManager load(CompoundTag tag) {
                  KingdomManager m = new KingdomManager();
                  ListTag list = tag.getList("Kingdoms", Tag.TAG_COMPOUND);
                  for (int i=0; i<list.size(); i++) { KingdomData k=KingdomData.load(list.getCompound(i)); m.kingdoms.put(k.getFlagPos(),k); }
                  return m;
              }
          }
