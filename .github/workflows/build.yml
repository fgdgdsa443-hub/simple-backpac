          cat > src/main/java/com/ancientkingdoms/kingdom/KingdomData.java << 'ENDOFFILE'
          package com.ancientkingdoms.kingdom;
          import net.minecraft.core.BlockPos;
          import net.minecraft.nbt.*;
          import java.util.*;
          public class KingdomData {
              public static final int TERRITORY_RADIUS = 128;
              private UUID ownerId; private String ownerName, kingdomName;
              private BlockPos flagPos; private int level, xp;
              private final List<BuildingSlot> buildings = new ArrayList<>();
              private final List<NpcWorker> workers = new ArrayList<>();
              public KingdomData() {}
              public KingdomData(UUID oid, String oname, BlockPos fp) {
                  ownerId=oid; ownerName=oname; kingdomName=oname+"'s Kingdom"; flagPos=fp; level=1; xp=0;
                  buildings.add(new BuildingSlot("Barracks",0,100)); buildings.add(new BuildingSlot("Blacksmith",0,150));
                  buildings.add(new BuildingSlot("Farm",0,80)); buildings.add(new BuildingSlot("Market",0,200));
                  buildings.add(new BuildingSlot("Watchtower",0,120)); buildings.add(new BuildingSlot("Library",0,175));
                  buildings.add(new BuildingSlot("Castle Wall",0,250)); buildings.add(new BuildingSlot("Royal Palace",0,500));
              }
              public UUID getOwnerId(){return ownerId;} public String getOwnerName(){return ownerName;}
              public String getKingdomName(){return kingdomName;} public void setKingdomName(String n){kingdomName=n;}
              public BlockPos getFlagPos(){return flagPos;} public int getLevel(){return level;} public int getXp(){return xp;}
              public List<BuildingSlot> getBuildings(){return buildings;} public List<NpcWorker> getWorkers(){return workers;}
              public boolean isOwner(UUID u){return ownerId.equals(u);}
              public boolean isInsideTerritory(BlockPos p){
                  double dx=p.getX()-flagPos.getX(), dz=p.getZ()-flagPos.getZ();
                  return Math.sqrt(dx*dx+dz*dz)<=TERRITORY_RADIUS;
              }
              public void addXp(int a){xp+=a; int n=xpForNextLevel(); while(xp>=n){xp-=n;level++;n=xpForNextLevel();}}
              public int xpForNextLevel(){return 200+(level-1)*100;}
              public CompoundTag save(){
                  CompoundTag t=new CompoundTag();
                  t.putUUID("OwnerId",ownerId); t.putString("OwnerName",ownerName); t.putString("KingdomName",kingdomName);
                  t.putInt("FlagX",flagPos.getX()); t.putInt("FlagY",flagPos.getY()); t.putInt("FlagZ",flagPos.getZ());
                  t.putInt("Level",level); t.putInt("Xp",xp);
                  ListTag bl=new ListTag(); for(BuildingSlot b:buildings) bl.add(b.save()); t.put("Buildings",bl);
                  ListTag wl=new ListTag(); for(NpcWorker w:workers) wl.add(w.save()); t.put("Workers",wl);
                  return t;
              }
              public static KingdomData load(CompoundTag t){
                  KingdomData d=new KingdomData();
                  d.ownerId=t.getUUID("OwnerId"); d.ownerName=t.getString("OwnerName"); d.kingdomName=t.getString("KingdomName");
                  d.flagPos=new BlockPos(t.getInt("FlagX"),t.getInt("FlagY"),t.getInt("FlagZ"));
                  d.level=t.getInt("Level"); d.xp=t.getInt("Xp");
                  ListTag bl=t.getList("Buildings",Tag.TAG_COMPOUND); for(int i=0;i<bl.size();i++) d.buildings.add(BuildingSlot.load(bl.getCompound(i)));
                  ListTag wl=t.getList("Workers",Tag.TAG_COMPOUND); for(int i=0;i<wl.size();i++) d.workers.add(NpcWorker.load(wl.getCompound(i)));
                  return d;
              }
              public static class BuildingSlot {
                  public String name; public int currentLevel, xpCost;
                  public BuildingSlot(String n,int l,int c){name=n;currentLevel=l;xpCost=c;}
                  public CompoundTag save(){CompoundTag t=new CompoundTag();t.putString("Name",name);t.putInt("Level",currentLevel);t.putInt("XpCost",xpCost);return t;}
                  public static BuildingSlot load(CompoundTag t){return new BuildingSlot(t.getString("Name"),t.getInt("Level"),t.getInt("XpCost"));}
              }
              public static class NpcWorker {
                  public UUID workerId; public String displayName;
                  public String currentTask=""; public long taskFinishTime=0;
                  public NpcWorker(UUID id,String n){workerId=id;displayName=n;}
                  public boolean isBusy(){return !currentTask.isEmpty()&&System.currentTimeMillis()<taskFinishTime;}
                  public long secondsLeft(){return Math.max(0,(taskFinishTime-System.currentTimeMillis())/1000);}
                  public CompoundTag save(){CompoundTag t=new CompoundTag();t.putUUID("WorkerId",workerId);t.putString("Name",displayName);t.putString("Task",currentTask);t.putLong("Finish",taskFinishTime);return t;}
                  public static NpcWorker load(CompoundTag t){NpcWorker w=new NpcWorker(t.getUUID("WorkerId"),t.getString("Name"));w.currentTask=t.getString("Task");w.taskFinishTime=t.getLong("Finish");return w;}
              }
          }
