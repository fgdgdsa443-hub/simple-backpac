          import net.minecraftforge.network.simple.SimpleChannel;
          public class AKNetwork {
              private static final String PROTOCOL = "1";
              public static final SimpleChannel CHANNEL = NetworkRegistry.newSimpleChannel(
                  new ResourceLocation(AncientKingdoms.MOD_ID, "main"), () -> PROTOCOL, PROTOCOL::equals, PROTOCOL::equals);
              private static int id = 0;
              public static void register() {
                  CHANNEL.messageBuilder(OpenKingdomMenuPacket.class, id++, NetworkDirection.PLAY_TO_CLIENT).encoder(OpenKingdomMenuPacket::encode).decoder(OpenKingdomMenuPacket::decode).consumerMainThread(OpenKingdomMenuPacket::handle).add();
                  CHANNEL.messageBuilder(OpenBlueprintMenuPacket.class, id++, NetworkDirection.PLAY_TO_CLIENT).encoder(OpenBlueprintMenuPacket::encode).decoder(OpenBlueprintMenuPacket::decode).consumerMainThread(OpenBlueprintMenuPacket::handle).add();
                  CHANNEL.messageBuilder(OpenWorldMapPacket.class, id++, NetworkDirection.PLAY_TO_CLIENT).encoder(OpenWorldMapPacket::encode).decoder(OpenWorldMapPacket::decode).consumerMainThread(OpenWorldMapPacket::handle).add();
                  CHANNEL.messageBuilder(SyncKingdomDataPacket.class, id++, NetworkDirection.PLAY_TO_CLIENT).encoder(SyncKingdomDataPacket::encode).decoder(SyncKingdomDataPacket::decode).consumerMainThread(SyncKingdomDataPacket::handle).add();
                  CHANNEL.messageBuilder(KingdomUpgradePacket.class, id++, NetworkDirection.PLAY_TO_SERVER).encoder(KingdomUpgradePacket::encode).decoder(KingdomUpgradePacket::decode).consumerMainThread(KingdomUpgradePacket::handle).add();
                  CHANNEL.messageBuilder(PlaceBlueprintPacket.class, id++, NetworkDirection.PLAY_TO_SERVER).encoder(PlaceBlueprintPacket::encode).decoder(PlaceBlueprintPacket::decode).consumerMainThread(PlaceBlueprintPacket::handle).add();
                  CHANNEL.messageBuilder(SetKingdomNamePacket.class, id++, NetworkDirection.PLAY_TO_SERVER).encoder(SetKingdomNamePacket::encode).decoder(SetKingdomNamePacket::decode).consumerMainThread(SetKingdomNamePacket::handle).add();
              }
              public static <T> void sendToPlayer(ServerPlayer p, T msg) { CHANNEL.send(PacketDistributor.PLAYER.with(() -> p), msg); }
              public static <T> void sendToServer(T msg) { CHANNEL.sendToServer(msg); }
          }
