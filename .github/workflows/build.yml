              private static final int MW=320, MH=200;
              public WorldMapScreen() { super(Component.literal("World Map")); }
              @Override protected void init() { addRenderableWidget(Button.builder(Component.literal("Close"), b -> onClose()).bounds(width/2+MW/2-50,height/2+MH/2+4,50,16).build()); }
              @Override public void render(GuiGraphics g, int mx, int my, float pt) {
                  renderBackground(g, mx, my, pt);
                  int ox=(width-MW)/2, oy=(height-MH)/2;
                  g.fill(ox,oy,ox+MW,oy+MH,0xFFF5DEB3);
                  g.fill(ox,oy,ox+MW,oy+2,0xFF8B4513); g.fill(ox,oy+MH-2,ox+MW,oy+MH,0xFF8B4513);
                  g.fill(ox,oy,ox+2,oy+MH,0xFF8B4513); g.fill(ox+MW-2,oy,ox+MW,oy+MH,0xFF8B4513);
                  g.drawCenteredString(font, "WORLD MAP", width/2, oy+5, 0x8B0000);
                  Minecraft mc = Minecraft.getInstance(); Player pl = mc.player;
                  if (pl == null) { super.render(g,mx,my,pt); return; }
